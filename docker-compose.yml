services:
  postgres:
    image: postgres:16
    container_name: carbona-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pcf_user
      POSTGRES_PASSWORD: pcf_password
      POSTGRES_DB: pcf_db
    volumes:
      - carbona_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcf_user -d pcf_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  next-app:
    build:
      context: .
    container_name: carbona-next
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://pcf_user:pcf_password@postgres:5432/pcf_db
    command: sh -c "yarn prisma db push && yarn next start -H 0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  carbona_postgres_data:
